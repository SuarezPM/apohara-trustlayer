version: 2
updates:
  # Rust crate dependencies (Cargo.toml / Cargo.lock at the repo root).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

  # Pinned GitHub Actions in .github/workflows/*.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
