name: CodeQL

# Static analysis (SAST) for the Rust code base via GitHub CodeQL. Rust is a
# supported CodeQL language (public preview); the v3 codeql-action handles the
# build/extraction. Findings surface in the repo's code-scanning / Security tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays at 07:23 UTC (off-peak, offset from the Scorecard run).
    - cron: "23 7 * * 1"

# Minimal default; the analyze job widens only the scopes CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    permissions:
      # Upload code-scanning results to the Security tab.
      security-events: write
      # Read the repo contents and Actions metadata CodeQL inspects.
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: rust

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
