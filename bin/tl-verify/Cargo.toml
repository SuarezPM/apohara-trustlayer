[package]
name = "tl-verify"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
license = "MIT"
authors = ["Pablo M. Suarez <suarezpm@csnat.unt.edu.ar>"]
description = "VOUCH offline verifier — CLI for evidence packet verification"

[[bin]]
name = "tl-verify"
path = "src/main.rs"

[dependencies]
tl-chain = { workspace = true }
tl-evidence = { workspace = true }
tl-receipt = { workspace = true }
tl-gate = { workspace = true }
themis-evidence = { workspace = true }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }
blake3 = "1"
ed25519-dalek = "2"
hex = "0.4"
base64 = "0.22"

[dev-dependencies]
proptest = "1"
tempfile = "3"
