name: Scorecard

# OpenSSF Scorecard: automated supply-chain security posture analysis.
# Results are published to the public OpenSSF dashboard and uploaded as SARIF
# so findings surface in the repo's GitHub code-scanning / Security tab.
on:
  schedule:
    # Weekly, Mondays at 06:17 UTC (off-peak to avoid the top-of-hour rush).
    - cron: "17 6 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

# Read-only by default; the analysis job widens only the scopes it needs.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Mint the OIDC token Scorecard uses to publish results.
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF dashboard, enabling the README badge.
          publish_results: true
          # Fine-grained PAT with `Administration: read` scope. Required so
          # scorecard-action's Branch-Protection check can read the new
          # branch protection API (rulesets) — the default GITHUB_TOKEN
          # is a classic OAuth token that lacks the ruleset scope and
          # surfaces "internal error: some github tokens can't read
          # classic branch protection rules". Set the secret via
          # `gh secret set SCORECARD_PAT` with a fine-grained PAT bound
          # to this repo with Administration:read + Contents:read +
          # Metadata:read.
          repo_token: ${{ secrets.SCORECARD_PAT || secrets.GITHUB_TOKEN }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
