name: CodeQL

# SAST for the apohara-trustlayer workspace. Two languages because the
# repo is a Rust + Python hybrid:
#   - Rust: the audit chain (tl-*, themis-*), SCITT receipts (tl-scitt),
#     agentguard sandbox, tl-ffi PyO3 binding, the tl-verify CLI binary.
#   - Python: services/control_plane, sdk/python/, e2e tests under tests/.
#
# Findings surface in the repo's code-scanning / Security tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays at 07:23 UTC (off-peak, offset from the Scorecard run).
    - cron: "23 7 * * 1"

# Minimal default; the analyze job widens only the scopes CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (rust + python)
    runs-on: ubuntu-latest
    permissions:
      # Upload code-scanning results to the Security tab.
      security-events: write
      # Read the repo contents and Actions metadata CodeQL inspects.
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Python is installed because `tl-ffi` (PyO3) needs libpython at
      # the autobuild step. Without this, `cargo build` triggered by
      # CodeQL's analyze phase fails with "Python.h: No such file" on
      # `tl-ffi` and any Python-dependent crate. 3.12 matches the
      # python-wheels.yml matrix.
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # The workspace pins `rust-version = "1.88"` in the root Cargo.toml.
      # Runners ship with a recent stable but explicit pinning avoids
      # future rust-version bumps silently invalidating the autobuild.
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: rust, python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
