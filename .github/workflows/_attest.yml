# Reusable SLSA Build L3 provenance workflow for apohara-trustlayer.
#
# WHY THIS EXISTS (the build/sign isolation rationale):
# SLSA Build L3 requires that provenance generation (the signing step) be
# isolated from the caller-controlled build steps, so a compromised build
# cannot forge or influence its own provenance. GitHub's mechanism for that
# isolation is a reusable workflow invoked via `on: workflow_call`: this
# workflow runs in a SEPARATE job/VM from the build, and the only thing the
# caller (release.yml) hands us is the already-built artifact + its
# identifiers.
# See: https://docs.github.com/actions/security-guides/using-artifact-attestations-and-reusable-workflows-to-achieve-slsa-v1-build-level-3
#
# LEVEL: **SLSA Build L3**, via the slsa-framework/slsa-github-generator
# (v2) `generator_generic_slsa3.yml` reusable workflow. Signing uses
# Sigstore + GitHub OIDC (keyless), and the resulting `.intoto.jsonl` is
# uploaded to the public Rekor transparency log. The signer identity is
# cryptographically bound to this workflow.
#
# Verification after a public run:
#   slsa-verifier verify-artifact tl-verify-x86_64-unknown-linux-gnu \
#     --provenance-path tl-verify-x86_64-unknown-linux-gnu.intoto.jsonl \
#     --source-uri github.com/SuarezPM/apohara-trustlayer \
#     --github-workflow-ref .github/workflows/_attest.yml
#
#   gh attestation verify tl-verify-x86_64-unknown-linux-gnu \
#     -R SuarezPM/apohara-trustlayer \
#     --signer-workflow SuarezPM/apohara-trustlayer/.github/workflows/_attest.yml
#
# This is the ONLY thing this workflow does. It does NOT publish to PyPI,
# create a GitHub Release, or touch any caller build step.

name: _attest (reusable SLSA Build L3 provenance)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: >-
          Name of the uploaded actions/upload-artifact bundle that contains
          the staged binary to attest (one per target).
        required: true
        type: string
      subject-name:
        description: >-
          File name of the staged binary inside the downloaded artifact,
          e.g. tl-verify (Linux/macOS) or tl-verify.exe (Windows).
        required: true
        type: string

# Both the caller job and this reusable workflow must hold these for
# keyless OIDC signing (id-token) + writing the attestation to the
# repo's attestations store (attestations). `contents: read` is the
# minimum needed to read the just-downloaded artifact.
permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  # Stage 1: pull the artifact into an isolated workspace and compute the
  # base64-encoded SHA256 subject the slsa-generator expects. The build
  # that produced the artifact ran in a different job/VM; we never re-run
  # any caller build step here.
  stage:
    name: stage + hash
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.hash.outputs.subject }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download staged artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: dist

      - name: Compute base64-encoded SHA256
        id: hash
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # sha256sum gives a hex digest (64 chars). The slsa-generator
          # expects `sha256:` followed by the BASE64 of the 32 raw hash
          # bytes, not the hex string.
          hex="$(sha256sum "${{ inputs.subject-name }}" | awk '{print $1}')"
          b64="$(printf '%s' "$hex" | xxd -r -p | base64 -w0)"
          echo "subject=sha256:${b64}" >> "$GITHUB_OUTPUT"
          echo "Staged subject: sha256:${b64}"

  # Stage 2: SLSA L3 provenance generation in a separate, fresh runner.
  # The slsa-framework generator signs the .intoto.jsonl with Sigstore
  # (keyless, via GitHub OIDC) and uploads it to Rekor. The signer
  # identity is bound to THIS workflow path in the repo, so a build job
  # cannot forge or substitute provenance.
  provenance:
    name: SLSA Build L3 (.intoto.jsonl)
    needs: stage
    # `attestations: write` is REQUIRED for the SLSA L3 generator
    # to publish the .intoto.jsonl to the Rekor transparency log.
    # Without it, the generator silently fails to produce a
    # usable attestation. The top-level `permissions:` block
    # already grants this, but job-level `permissions:`
    # OVERRIDES the workflow-level — so we must repeat it here.
    permissions:
      id-token: write
      attestations: write
      # `actions: read` is REQUIRED by the slsa-github-generator v2.1.0
      # `generator` job (see generator_generic_slsa3.yml line 154 — declared
      # at job-level permissions block, comment "Needed to read workflow info"
      # for the `Generate builder` step that calls .github/actions/generate-builder@v2.1.0).
      # Without it, the workflow graph fails validation at parse time with
      # `startup_failure` (0 jobs, ~2 seconds) — the caller MUST grant ALL
      # permissions that any reachable job in a reusable workflow declares.
      actions: read
      # `contents: write` is REQUIRED by the slsa-generator's `upload-assets`
      # job (line 266: "Needed to write artifacts to a release"). Although
      # that job is conditional on `inputs.upload-assets && tag-pushed`
      # (defaults to skipped for us), GH Actions graph-validates ALL jobs
      # in the reachable reusable-workflow tree at parse time, regardless of
      # their `if:` condition. Without this grant, validation fails.
      # `write` subsumes `read`, so no separate `contents: read` needed.
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.stage.outputs.subject }}
