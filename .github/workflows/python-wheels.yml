name: Python wheels

on:
  push:
    branches: [main]
    paths:
      - "crates/tl-ffi/**"
      - "sdk/python/**"
      - ".github/workflows/python-wheels.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "crates/tl-ffi/**"
      - "sdk/python/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python_version: "3.12"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            python_version: "3.12"
          - os: macos-latest
            target: x86_64-apple-darwin
            python_version: "3.12"
          - os: macos-latest
            target: aarch64-apple-darwin
            python_version: "3.12"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python_version: "3.12"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@1bd1e32a3e70a9e90b253bb4fbbb9b8b56fa5fe7 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Python ${{ matrix.python_version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install maturin
        run: pip install "maturin==1.8.3"

      - name: Build wheel (maturin)
        run: |
          cd sdk/python
          maturin build --release --out dist/wheels/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-${{ matrix.target }}
          path: sdk/python/dist/wheels/*.whl

  publish:
    name: Publish to PyPI (on tag)
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/wheels
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/wheels
          skip-existing: true
