name: Publish crates (crates.io)

# Publishes workspace member crates to crates.io via Trusted Publishing
# (OIDC token exchange). Triggered on `v*` tag push.
# Requires admin to:
#   1. Set CARGO_REGISTRY_TOKEN secret on this repo.
#   2. Configure Trusted Publisher on crates.io for each workspace
#      member ("SuarezPM/apohara-trustlayer" + this workflow).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: cargo publish (workspace)
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Trusted Publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: cargo publish (each workspace member, idempotent on re-run)
        run: |
          set -euo pipefail
          for crate in $(cargo metadata --format-version 1 --no-deps | python3 -c "import sys,json; print(chr(10).join(p['name'] for p in json.load(sys.stdin)['packages']))"); do
            echo "==> Publishing $crate"
            cargo publish -p "$crate" --locked --no-verify || echo "::warning::publish failed for $crate (may already be uploaded)"
          done
