name: CI

# Workspace CI for apohara-trustlayer (Rust + Python hybrid).
# Adapted from apohara-argus's CI for the trustlayer stack:
#   - Rust: fmt + clippy (-D warnings) + test matrix (ubuntu/macos/windows)
#     + cargo-deny (licenses + advisories) + cargo-audit.
#   - Python: ruff lint + pytest (via uv, matching `make test`) + pip-audit.
#
# Push on main and every PR. A red gate blocks the merge.
# Does NOT publish anything; python-wheels.yml owns PyPI, release.yml owns
# the `tl-verify` GitHub Release artifacts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Token-Permissions 10/10: top-level default is `contents: read` only.
# No job needs to widen (audit/upload steps go to artifacts, not the repo).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # No-warning-debt rule: any clippy warning is an error.
  RUSTFLAGS: "-D warnings"

jobs:
  # ===========================================================================
  # RUST JOBS
  # ===========================================================================

  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install protoc
        # Required by themis-evidence/build.rs (Rekor v2 protobuf codegen).
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.7.4
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Hard gate: full workspace test matrix (Linux / macOS / Windows).
  # Python is required at test time because `tl-ffi` (PyO3) links against
  # libpython even in test builds that don't exercise the binding directly.
  rust-test:
    name: rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # all platforms: themis-evidence/build.rs (Rekor v2 protobuf
      # codegen) needs `protoc`. Linux uses protobuf-compiler (apt);
      # macOS uses protobuf (brew); Windows uses protoc (choco). Recent
      # GH-runner images no longer ship protoc pre-installed on
      # macos-14 / windows-2022, so we install on all 3 to be safe.
      - name: Install protoc (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install -y protoc
        shell: pwsh
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.7.4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Run workspace tests
        run: cargo test --workspace --locked

  # License allowlist + RUSTSEC advisories + cargo-audit (defense in depth).
  # The 1 ignored advisory (RUSTSEC-2023-0071 rsa Marvin Attack) is
  # documented in deny.toml with a per-entry rationale: transitive via
  # themis-evidence (x509-tsp); not signing surface; Ed25519 only.
  rust-deny:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny + cargo-audit
        run: |
          cargo install --locked cargo-deny
          cargo install --locked cargo-audit
      # Fails on any dependency license outside the allowlist in deny.toml.
      - run: cargo deny check licenses
      # Monitor RUSTSEC advisories against the dependency tree
      # (dependency_monitoring). Uses the [advisories] section in deny.toml.
      - run: cargo deny check advisories
      # Defense-in-depth: also run the standalone cargo-audit walker.
      # cargo-deny and cargo-audit share the same RustSec advisory DB but
      # sometimes catch a crate the other misses (different version range
      # matching, different sourcing).
      # Point cargo-audit at a separate DB path so it doesn't conflict
      # with cargo-deny's clone at ~/.cargo/advisory-db (cargo-audit
      # refuses to git-clone into a non-empty dir).
      - run: cargo audit -d ~/.cargo/advisory-db-audit --deny warnings

  # ===========================================================================
  # PYTHON JOBS
  # ===========================================================================

  # Lint: ruff over the control plane, the Python SDK sources, the e2e
  # tests, and the support scripts. ruff default returns non-zero on
  # findings, which is the merge-blocking signal we want.
  python-lint:
    name: ruff (Python lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install --require-hashes --quiet -r requirements-ci.txt
      - name: ruff check
        run: |
          ruff check \
            services/control_plane \
            sdk/python/src \
            tests/ \
            scripts/

  # pytest mirrors the Python section of `make test`. The exact `--with`
  # list is replicated verbatim from the Makefile (services/control_plane
  # tests pull in fastapi + sqlalchemy + asyncpg + structlog + pyjwt + a
  # full pydantic email stack), so we don't rely on a committed
  # requirements.txt (the `uv run --no-project` model is intentional —
  # dependencies resolve from PyPI per-run, identical to `make test`).
  python-test:
    name: pytest (Python tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: apohara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TL_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/apohara_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install --require-hashes --quiet -r requirements-ci.txt
      - name: Install protoc
        # Required by tests/test_config_fail_fast.py::test_tsa_fail_fast_compile_test
        # which spawns cargo test tsa::tests (uses prost-build / Rekor v2 codegen).
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Run pytest suite
        env:
          # `app` lives at services/control_plane/app/; PYTHONPATH must
          # point at the package root (services/control_plane) so
          # `from app.x import y` resolves under `uv run --no-project`.
          PYTHONPATH: services/control_plane
        run: |
          uv run --no-project \
            --with pytest --with pytest-asyncio --with pytest-cov \
            --with httpx --with fastapi \
            --with 'pydantic[email]' --with pydantic-settings \
            --with sqlalchemy --with asyncpg --with aiosqlite --with structlog \
            --with pyjwt --with uvicorn \
            --with cryptography \
            --with reportlab \
            --with maturin \
            pytest tests/ -v --tb=short

  # pip-audit: counterpart to `cargo deny check advisories`. The repo has
  # no committed requirements.txt (uv-managed per-run), so we resolve
  # the runtime + test deps into a throwaway venv and audit it. The dep
  # list is the same `--with` set used by `make test` / the python-test
  # job above — what users actually get at install time.
  python-audit:
    name: pip-audit (Python dep audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install --require-hashes --quiet -r requirements-ci.txt
      - name: Build audit venv from hash-pinned requirements-audit.txt
        run: |
          python -m venv .audit-venv
          . .audit-venv/bin/activate
          pip install --require-hashes --quiet -r requirements-audit.txt
      - name: pip-audit
        run: . .audit-venv/bin/activate && pip-audit --strict
