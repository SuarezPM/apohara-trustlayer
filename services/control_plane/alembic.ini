# Alembic configuration for TrustLayer control plane migrations.
#
# Per Plan v1.2 Block 4 v1.2-US-1 (closes multi-tenant SaaS gap):
# the `chain_id` namespace is per-tenant to prevent cross-tenant chain
# collisions in a true multi-tenant deployment.
#
# Usage:
#   cd services/control_plane
#   alembic upgrade head                    # apply all migrations
#   alembic downgrade -1                    # rollback last migration
#   alembic revision --autogenerate -m "..."  # auto-generate from models

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
