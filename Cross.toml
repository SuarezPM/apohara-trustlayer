# cross-rs configuration for apohara-trustlayer.
#
# Required because release.yml uses `cross build` for aarch64-linux builds
# (the GH-hosted ubuntu-latest runner doesn't have an aarch64 glibc
# toolchain). The default cross-rs image (ghcr.io/cross-rs/aarch64-unknown-linux-gnu)
# does NOT ship `protoc` pre-installed, and the themis-evidence crate's
# build.rs uses Rekor v2 protobuf codegen which requires protoc.
#
# `pre-build` runs INSIDE the cross container before cargo build.
# See https://github.com/cross-rs/cross#pre-build for syntax.
#
# NOTE: must be a single line (no newlines). cross-rs passes the value as
# `--build-arg CROSS_SCRIPT=...` to `docker build`; newlines in the value
# produce "header key 'followpaths' contains value with non-printable ASCII
# characters" errors at the buildx frontend.
[target.aarch64-unknown-linux-gnu]
pre-build = "apt-get update && apt-get install -y --no-install-recommends protobuf-compiler && rm -rf /var/lib/apt/lists/*"
